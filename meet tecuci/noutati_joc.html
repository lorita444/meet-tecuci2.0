<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Tecuci - Noutăți (Joc)</title>
    <link rel="stylesheet" href="stileto.css">
    <link rel="icon" type="image/x-icon" href="resurse/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        .carti_wrapper {
            margin: 40px auto;
            max-width: 800px;
            text-align: center;
        }
        .carti {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 0 auto 30px;
        }
        .carte {
            width: 100%;
            cursor: pointer;
            border-radius: 10px;
            transition: transform 0.3s;
        }
        .carte:hover {
            transform: scale(1.05);
        }
        #photo {
            width: 80%;
            max-width: 600px;
            position: fixed;
            z-index: 9999;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            border: 4px solid var(--primary-color);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="acasa.html">
                <img class="logo" src="resurse/logo.png" alt="Logo Meet Tecuci">
            </a>
            <ul class="pff">
                <li class="chestie_meniu">
                    <a href="acasa.html" class="linkuri_meniu">Acasă</a>
                </li>
                <li class="chestie_meniu">
                    <a href="istoric.html" class="linkuri_meniu">Istoric</a>
                    <div class="dropdown_content">
                        <a href="istoric.html#tecuci">Istoric Tecuci</a>
                        <a href="istoric.html#mustar">Istoric Muștar</a>
                    </div>
                </li>
                <li class="chestie_meniu">
                    <a href="asezare.html" class="linkuri_meniu">Așezare</a>
                </li>
                <li class="chestie_meniu">
                    <a href="noutati.html" class="linkuri_meniu" style="color: var(--text-dark);">Noutăți</a>
                </li>
                <li class="chestie_meniu">
                    <a href="contact.html" class="linkuri_meniu">Contact</a>
                    <div class="dropdown_content">
                        <a href="contact.html">Detalii Contact</a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <audio autoplay>
        <source src="resurse/sunet_scris.mp3" type="audio/mpeg">
    </audio>

    <main class="full-width">
        <div style="max-width: 1200px; margin: 0 auto; padding: 20px;">
            <div class="typing_anim_2"></div>

            <div class="carti_wrapper glass-panel">
                <h2 style="margin-bottom: 20px; color: var(--primary-color); text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Găsește perechile pentru a afla știrile!</h2>
                
                <div class="carti">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                    <img src="resurse/carte spate2.png" class="carte" alt="Spate Carte">
                </div>
                
                <div class="butonn">
                    <button class="custom_btn" onclick="resetGame()">RESTART</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Meet Tecuci. Toate drepturile rezervate.</p>
    </footer>

    <script src="javra.js"></script>
</body>
</html>
